<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GPS Lat/Long</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                font-family: Consolas, "Courier New", monospace;
                background: #f7f7f7;
                color: #111;
            }
            #coords {
                font-size: 24px;
                line-height: 1.8;
                white-space: pre-line;
                text-align: left;
                padding: 16px 20px;
                border: 1px solid #ddd;
                border-radius: 12px;
                background: #fff;
            }
        </style>
    </head>
    <body>
        <div id="coords">กำลังขอสิทธิ์ตำแหน่ง...</div>

        <script>
            const out = document.getElementById("coords");
            const MICRO_DEGREE = 0.000001;
            const BANGKOK_LAT = 13.7563;

            function metersPerDegreeLat(latDeg) {
                const latRad = (latDeg * Math.PI) / 180;
                return (
                    111132.92 -
                    559.82 * Math.cos(2 * latRad) +
                    1.175 * Math.cos(4 * latRad) -
                    0.0023 * Math.cos(6 * latRad)
                );
            }

            function metersPerDegreeLon(latDeg) {
                const latRad = (latDeg * Math.PI) / 180;
                return (
                    111412.84 * Math.cos(latRad) -
                    93.5 * Math.cos(3 * latRad) +
                    0.118 * Math.cos(5 * latRad)
                );
            }

            function render(position) {
                const { latitude, longitude } = position.coords;
                const latMicroMeter =
                    metersPerDegreeLat(latitude) * MICRO_DEGREE;
                const lonMicroMeter =
                    metersPerDegreeLon(BANGKOK_LAT) * MICRO_DEGREE;
                out.textContent =
                    `lat: ${String(latitude)}\n` +
                    `long: ${String(longitude)}\n` +
                    `0.000001 lat ~= ${latMicroMeter.toFixed(3)} m\n` +
                    `0.000001 long (BKK) ~= ${lonMicroMeter.toFixed(3)} m`;
            }

            function fail(err) {
                out.textContent = `error: ${err.message}`;
            }

            if (!("geolocation" in navigator)) {
                out.textContent = "error: browser ไม่รองรับ geolocation";
            } else {
                navigator.geolocation.watchPosition(render, fail, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 3000,
                });
            }
        </script>
    </body>
</html>
