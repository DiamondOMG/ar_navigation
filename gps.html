<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS Lat/Long</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Consolas, "Courier New", monospace;
      background: #f7f7f7;
      color: #111;
    }
    #coords {
      font-size: 24px;
      line-height: 1.8;
      white-space: pre-line;
      text-align: left;
      padding: 16px 20px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div id="coords">กำลังขอสิทธิ์ตำแหน่ง...</div>

  <script>
    const out = document.getElementById('coords');

    function render(position) {
      const { latitude, longitude } = position.coords;
      out.textContent = `lat: ${String(latitude)}\nlong: ${String(longitude)}`;
    }

    function fail(err) {
      out.textContent = `error: ${err.message}`;
    }

    if (!('geolocation' in navigator)) {
      out.textContent = 'error: browser ไม่รองรับ geolocation';
    } else {
      navigator.geolocation.watchPosition(render, fail, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 15000
      });
    }
  </script>
</body>
</html>
