<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WebAR 360° วงกลมรอบตัว</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                font-family: Arial, sans-serif;
            }
            #video {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            #canvas {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }
            #info {
                position: absolute;
                top: 20px;
                left: 20px;
                color: white;
                background: rgba(0, 0, 0, 0.7);
                padding: 15px;
                border-radius: 8px;
                font-size: 14px;
                z-index: 10;
                max-width: 250px;
            }
            #startBtn {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                padding: 20px 40px;
                font-size: 18px;
                background: #4caf50;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                z-index: 20;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            }
            #startBtn:hover {
                background: #45a049;
            }
            .color-legend {
                margin-top: 10px;
                font-size: 12px;
            }
            .color-item {
                display: flex;
                align-items: center;
                margin: 3px 0;
            }
            .color-box {
                width: 15px;
                height: 15px;
                border-radius: 3px;
                margin-right: 8px;
            }
        </style>
    </head>
    <body>
        <button id="startBtn">เริ่ม AR 360°</button>
        <video id="video" autoplay playsinline></video>
        <div id="info">
            <div>🎯 WebAR 360° - หมุนมือถือดูรอบตัว</div>
            <div class="color-legend">
                <div class="color-item">
                    <div class="color-box" style="background: #ff6b6b"></div>
                    หน้า (แดง)
                </div>
                <div class="color-item">
                    <div class="color-box" style="background: #4ecdc4"></div>
                    หลัง (เขียวน้ำเงิน)
                </div>
                <div class="color-item">
                    <div class="color-box" style="background: #ffe66d"></div>
                    ซ้าย (เหลือง)
                </div>
                <div class="color-item">
                    <div class="color-box" style="background: #a8e6cf"></div>
                    ขวา (เขียวอ่อน)
                </div>
                <div class="color-item">
                    <div class="color-box" style="background: #ff8b94"></div>
                    บน (ชมพู)
                </div>
                <div class="color-item">
                    <div class="color-box" style="background: #c7ceea"></div>
                    ล่าง (ม่วงอ่อน)
                </div>
            </div>
        </div>

        <script>
            let scene, camera, renderer;
            let spheres = [];
            let video;

            // ตัวแปรสำหรับไจโรสโคป
            const zee = new THREE.Vector3(0, 0, 1);
            const euler = new THREE.Euler();
            const q0 = new THREE.Quaternion();
            const q1 = new THREE.Quaternion(
                -Math.sqrt(0.5),
                0,
                0,
                Math.sqrt(0.5),
            ); // -90 degrees around X
            let screenOrientation = window.orientation || 0;

            document
                .getElementById("startBtn")
                .addEventListener("click", startAR);

            async function startAR() {
                document.getElementById("startBtn").style.display = "none";

                // เริ่มกล้อง
                video = document.getElementById("video");
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: "environment",
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                        },
                    });
                    video.srcObject = stream;
                } catch (err) {
                    alert("ไม่สามารถเข้าถึงกล้องได้: " + err.message);
                    return;
                }

                // ขออนุญาตใช้ไจโรสโคป (สำหรับ iOS)
                if (
                    typeof DeviceOrientationEvent !== "undefined" &&
                    typeof DeviceOrientationEvent.requestPermission ===
                        "function"
                ) {
                    try {
                        const permission =
                            await DeviceOrientationEvent.requestPermission();
                        if (permission === "granted") {
                            window.addEventListener(
                                "deviceorientation",
                                handleOrientation,
                                true,
                            );
                        }
                    } catch (err) {
                        alert("ไม่สามารถเข้าถึงไจโรสโคปได้");
                    }
                } else {
                    window.addEventListener(
                        "deviceorientation",
                        handleOrientation,
                        true,
                    );
                }

                // ตรวจสอบการหมุนหน้าจอ
                window.addEventListener(
                    "orientationchange",
                    handleScreenOrientation,
                );

                // สร้าง Three.js scene
                scene = new THREE.Scene();

                // สร้างกล้อง
                camera = new THREE.PerspectiveCamera(
                    75,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    1000,
                );
                camera.position.set(0, 0, 0);

                // สร้าง renderer
                renderer = new THREE.WebGLRenderer({
                    alpha: true,
                    antialias: true,
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.domElement.id = "canvas";
                document.body.appendChild(renderer.domElement);

                // สร้างวงกลมรอบตัว - 6 ทิศทาง
                const distance = 4;
                const sphereSize = 0.4;

                const positions = [
                    { pos: [0, 0, -distance], color: 0xff6b6b, name: "หน้า" },
                    { pos: [0, 0, distance], color: 0x4ecdc4, name: "หลัง" },
                    { pos: [-distance, 0, 0], color: 0xffe66d, name: "ซ้าย" },
                    { pos: [distance, 0, 0], color: 0xa8e6cf, name: "ขวา" },
                    { pos: [0, distance, 0], color: 0xff8b94, name: "บน" },
                    { pos: [0, -distance, 0], color: 0xc7ceea, name: "ล่าง" },
                ];

                positions.forEach((item) => {
                    const geometry = new THREE.SphereGeometry(
                        sphereSize,
                        32,
                        32,
                    );
                    const material = new THREE.MeshStandardMaterial({
                        color: item.color,
                        metalness: 0.3,
                        roughness: 0.4,
                        emissive: item.color,
                        emissiveIntensity: 0.2,
                    });
                    const sphere = new THREE.Mesh(geometry, material);
                    sphere.position.set(...item.pos);
                    sphere.userData.name = item.name;
                    scene.add(sphere);
                    spheres.push(sphere);
                });

                // เพิ่มแสง
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
                scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(
                    0xffffff,
                    0.5,
                );
                directionalLight.position.set(5, 5, 5);
                scene.add(directionalLight);

                // จัดการขนาดหน้าจอ
                window.addEventListener("resize", onWindowResize);

                // เริ่ม animation loop
                animate();
            }

            function handleScreenOrientation() {
                screenOrientation = window.orientation || 0;
            }

            function handleOrientation(event) {
                if (!event.alpha) return;

                // แปลงค่าจากไจโรเป็น Quaternion แบบถูกต้อง
                const alpha = THREE.MathUtils.degToRad(event.alpha);
                const beta = THREE.MathUtils.degToRad(event.beta);
                const gamma = THREE.MathUtils.degToRad(event.gamma);
                const orient = THREE.MathUtils.degToRad(screenOrientation);

                // ตั้งค่า Euler angles ด้วยลำดับที่ถูกต้อง
                euler.set(beta, alpha, -gamma, "YXZ");

                // แปลงเป็น Quaternion
                camera.quaternion.setFromEuler(euler);

                // ปรับตาม screen orientation
                camera.quaternion.multiply(q1);
                camera.quaternion.multiply(q0.setFromAxisAngle(zee, -orient));
            }

            function animate() {
                requestAnimationFrame(animate);

                // หมุนวงกลมเล็กน้อยเพื่อความสวยงาม
                spheres.forEach((sphere) => {
                    sphere.rotation.x += 0.01;
                    sphere.rotation.y += 0.01;
                });

                renderer.render(scene, camera);
            }

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        </script>
    </body>
</html>
