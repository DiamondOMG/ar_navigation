<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, user-scalable=no, minimum-scale=1, maximum-scale=1"
        />
        <title>Test Encantar Image Track</title>
        <script src="./web_libs/encantar/encantar.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/aframe@1.7.1/dist/aframe-v1.7.1.min.js"></script>
        <script src="./web_libs/encantar/plugins/aframe-with-encantar.min.js"></script>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #000;
            }
        </style>
    </head>
    <body>
        <a-scene
            encantar="stats: false; gizmos: false"
            loading-screen="enabled: false"
        >
            <ar-sources>
                <ar-camera-source
                    resolution="1080p"
                    facing-mode="environment"
                ></ar-camera-source>
            </ar-sources>

            <ar-trackers>
                <ar-image-tracker resolution="720p">
                    <ar-reference-image
                        name="door"
                        src="./door_panels_main.jpg"
                    ></ar-reference-image>
                </ar-image-tracker>
            </ar-trackers>

            <ar-viewport></ar-viewport>
            <ar-camera></ar-camera>

            <!-- Track สำเร็จ → แสดงวงกลมที่ตำแหน่งรูป -->
            <ar-root reference-image="door">

                <!-- วงกลมวงนอก -->
                <a-ring
                    position="0 0 0.01"
                    radius-inner="0.18"
                    radius-outer="0.22"
                    color="#00e5ff"
                    material="shader: flat; side: double; opacity: 0.9"
                    animation="property: scale; dir: alternate; dur: 1000; loop: true; from: 0.9 0.9 0.9; to: 1.15 1.15 1.15; easing: easeInOutSine"
                ></a-ring>

                <!-- วงกลมวงใน -->
                <a-ring
                    position="0 0 0.02"
                    radius-inner="0.08"
                    radius-outer="0.12"
                    color="#00e5ff"
                    material="shader: flat; side: double; opacity: 0.7"
                    animation="property: scale; dir: alternate; dur: 700; loop: true; from: 1 1 1; to: 1.2 1.2 1.2; easing: easeInOutSine"
                ></a-ring>

                <!-- จุดกลาง -->
                <a-circle
                    position="0 0 0.03"
                    radius="0.03"
                    color="#00e5ff"
                    material="shader: flat; opacity: 0.8"
                ></a-circle>

            </ar-root>
        </a-scene>
    </body>
</html>
