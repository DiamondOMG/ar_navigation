<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, user-scalable=no, minimum-scale=1, maximum-scale=1"
        />
        <title>Test Encantar Image Track</title>
        <script src="./web_libs/encantar/encantar.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/aframe@1.7.1/dist/aframe-v1.7.1.min.js"></script>
        <script src="./web_libs/encantar/plugins/aframe-with-encantar.min.js"></script>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #000;
            }
        </style>
    </head>
    <body>
        <a-scene
            encantar="stats: false; gizmos: false"
            loading-screen="enabled: false"
        >
            <a-assets>
                <a-asset-item id="arrow-model" src="assets/arrow.glb"></a-asset-item>
            </a-assets>

            <ar-sources>
                <ar-camera-source
                    resolution="1080p"
                    facing-mode="environment"
                ></ar-camera-source>
            </ar-sources>

            <ar-trackers>
                <ar-image-tracker resolution="720p">
                    <ar-reference-image
                        name="door"
                        src="./door_panels_main.jpg"
                    ></ar-reference-image>
                </ar-image-tracker>
            </ar-trackers>

            <ar-viewport></ar-viewport>
            <ar-camera></ar-camera>

            <!-- Light for GLTF model -->
            <a-light type="ambient" intensity="3.1416"></a-light>

            <!-- Track สำเร็จ → แสดงโมเดลลูกศร -->
            <ar-root reference-image="door">
                <a-entity
                    gltf-model="#arrow-model"
                    position="0 0 0.1"
                    rotation="90 0 0"
                    scale="0.5 0.5 0.5"
                    animation="property: position; to: 0 0 0.2; dir: alternate; dur: 800; loop: true; easing: easeInOutSine"
                ></a-entity>
            </ar-root>
        </a-scene>
    </body>
</html>
